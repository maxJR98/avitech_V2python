{% extends "base.html" %}

{% block title %}{{ 'Editar' if branch else 'Nueva' }} Sucursal{% endblock %}

{% block content %}
<h1>{{ 'Editar' if branch else 'Nueva' }} Sucursal</h1>
<form method="post" class="row g-3">
    <div class="col-md-6">
        <label for="name" class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ branch.name if branch else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="phone" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="phone" name="phone" value="{{ branch.phone if branch else '' }}">
    </div>
    <div class="col-12">
        <label for="address" class="form-label">Dirección *</label>
        <input type="text" class="form-control" id="address" name="address" value="{{ branch.address if branch else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="latitude" class="form-label">Latitud *</label>
        <input type="number" step="any" class="form-control" id="latitude" name="latitude" value="{{ branch.latitude if branch else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="longitude" class="form-label">Longitud *</label>
        <input type="number" step="any" class="form-control" id="longitude" name="longitude" value="{{ branch.longitude if branch else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" value="{{ branch.email if branch else '' }}">
    </div>
    <div class="col-md-6">
        <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if branch and branch.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Activo</label>
        </div>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('admin.list_branches') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
