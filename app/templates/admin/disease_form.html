{% extends "base.html" %}

{% block title %}{{ 'Editar' if disease else 'Nueva' }} Enfermedad{% endblock %}

{% block content %}
<h1>{{ 'Editar' if disease else 'Nueva' }} Enfermedad</h1>
<form method="post" class="row g-3">
    <div class="col-md-6">
        <label for="name" class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ disease.name if disease else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="scientific_name" class="form-label">Nombre científico</label>
        <input type="text" class="form-control" id="scientific_name" name="scientific_name" value="{{ disease.scientific_name if disease else '' }}">
    </div>
    <div class="col-12">
        <label for="description" class="form-label">Descripción</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ disease.description if disease else '' }}</textarea>
    </div>
    <div class="col-md-6">
        <label for="treatment" class="form-label">Tratamiento</label>
        <textarea class="form-control" id="treatment" name="treatment" rows="3">{{ disease.treatment if disease else '' }}</textarea>
    </div>
    <div class="col-md-6">
        <label for="prevention" class="form-label">Prevención</label>
        <textarea class="form-control" id="prevention" name="prevention" rows="3">{{ disease.prevention if disease else '' }}</textarea>
    </div>
    <div class="col-12">
        <label for="keywords" class="form-label">Palabras clave (separadas por coma)</label>
        <input type="text" class="form-control" id="keywords" name="keywords" value="{{ disease.keywords if disease else '' }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('admin.list_diseases') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
