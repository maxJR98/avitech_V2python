{% extends "base.html" %}

{% block title %}{{ 'Editar' if product else 'Nuevo' }} Producto{% endblock %}

{% block content %}
<h1>{{ 'Editar' if product else 'Nuevo' }} Producto</h1>
<form method="post" class="row g-3">
    <div class="col-md-6">
        <label for="name" class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ product.name if product else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="price" class="form-label">Precio *</label>
        <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price if product else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="category" class="form-label">Categoría</label>
        <input type="text" class="form-control" id="category" name="category" value="{{ product.category if product else '' }}">
    </div>
    <div class="col-md-6">
        <label for="image_url" class="form-label">URL de imagen</label>
        <input type="text" class="form-control" id="image_url" name="image_url" value="{{ product.image_url if product else '' }}">
    </div>
    <div class="col-12">
        <label for="description" class="form-label">Descripción</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ product.description if product else '' }}</textarea>
    </div>
    <div class="col-12">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if product and product.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Activo</label>
        </div>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('admin.list_products') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
